services:
  postgres:
    image: postgres:16-alpine
    container_name: jewelry-catalog-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: jewelry_catalog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
